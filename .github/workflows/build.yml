name: Build Firmware

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: nice_nano_v2
            shield: corne_left
            artifact_name: trovatore-left
          - board: nice_nano_v2
            shield: corne_right
            artifact_name: trovatore-right

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update --fetch-opt=--filter=tree:0

      - name: Apply dual OLED patch
        run: |
          if [ -f patches/zmk-dual-oled.patch ]; then
            git -C zmk apply "${GITHUB_WORKSPACE}/patches/zmk-dual-oled.patch"
          fi

      - name: West Zephyr export
        run: west zephyr-export

      - name: Build ${{ matrix.shield }}
        run: |
          west build -s zmk/app -d "build/${{ matrix.shield }}" -b "${{ matrix.board }}" -- \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" \
            -DSHIELD="${{ matrix.shield }}"

      - name: Collect artifact
        run: |
          mkdir -p "build/${{ matrix.shield }}/artifacts"
          if [ -f "build/${{ matrix.shield }}/zephyr/zmk.uf2" ]; then
            cp "build/${{ matrix.shield }}/zephyr/zmk.uf2" "build/${{ matrix.shield }}/artifacts/${{ matrix.artifact_name }}.uf2"
          elif [ -f "build/${{ matrix.shield }}/zephyr/zmk.bin" ]; then
            cp "build/${{ matrix.shield }}/zephyr/zmk.bin" "build/${{ matrix.shield }}/artifacts/${{ matrix.artifact_name }}.bin"
          else
            echo "No build output found" >&2
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/${{ matrix.shield }}/artifacts